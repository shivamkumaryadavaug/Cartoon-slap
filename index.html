<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Cartoon Slap Simulator</title>
  <meta name="description" content="A goofy, 100% cartoon stress-relief slap simulator. No real people, no violence — just silly fun." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- ============ 3D CANVAS MOUNT POINT ============ -->
  <div id="canvas-root">
    <canvas id="scene-canvas"></canvas>
    <div id="css2d-root"></div>
  </div>

  <!-- ============ TOP BAR ============ -->
  <header class="topbar glass">
    <h1 class="title">
      <span class="title-emoji" aria-hidden="true">🖐️</span>
      Cartoon Slap Simulator
    </h1>
    <p class="subtitle">100% cartoon. 0% real violence. Just silly stress relief.</p>
  </header>

  <!-- ============ NAME INPUT ============ -->
  <section class="name-panel glass" aria-label="Name your character">
    <input
      id="name-input"
      type="text"
      maxlength="16"
      placeholder="Enter character name..."
      autocomplete="off"
    />
    <button id="apply-name-btn" class="btn btn-secondary">Apply Name</button>
  </section>

  <!-- ============ SPEECH BUBBLE (positioned via JS over canvas) ============ -->
  <div id="speech-bubble" class="speech-bubble hidden" aria-live="polite"></div>

  <!-- ============ MAIN SLAP CONTROL ============ -->
  <main class="controls">
    <button id="slap-btn" class="btn btn-slap" aria-label="Slap!">
      <span class="slap-btn-label">SLAP!</span>
      <span class="slap-btn-sub">(Space)</span>
    </button>
  </main>

  <!-- ============ BOTTOM BAR ============ -->
  <footer class="bottombar glass">
    <div class="counter-wrap">
      <span class="counter-label">Slaps</span>
      <span id="slap-counter" class="counter-value">0</span>
    </div>

    <div class="theme-wrap">
      <label for="theme-select" class="visually-hidden">Theme</label>
      <select id="theme-select" class="theme-select">
        <option value="classic">Classic</option>
        <option value="neon">Neon</option>
        <option value="space">Space</option>
        <option value="forest">Forest</option>
        <option value="cyberpunk">Cyberpunk</option>
      </select>
    </div>

    <div class="footer-buttons">
      <button id="settings-btn" class="btn btn-icon" aria-label="Settings" title="Settings">⚙️</button>
      <button id="reset-btn" class="btn btn-icon" aria-label="Reset counter" title="Reset counter (R)">↺</button>
    </div>
  </footer>

  <!-- ============ SETTINGS PANEL (MODAL) ============ -->
  <div id="settings-overlay" class="settings-overlay hidden">
    <div class="settings-panel glass" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close-btn" class="btn btn-icon" aria-label="Close settings">✕</button>
      </div>

      <div class="settings-row">
        <label for="sound-toggle">Sound Effects</label>
        <input type="checkbox" id="sound-toggle" checked />
      </div>

      <div class="settings-row">
        <label for="music-toggle">Ambient Music</label>
        <input type="checkbox" id="music-toggle" checked />
      </div>

      <div class="settings-row">
        <label for="volume-slider">Volume</label>
        <input type="range" id="volume-slider" min="0" max="100" value="70" />
      </div>

      <div class="settings-row">
        <label for="particles-toggle">Particle Effects</label>
        <input type="checkbox" id="particles-toggle" checked />
      </div>

      <div class="settings-row">
        <label for="shake-toggle">Camera Shake</label>
        <input type="checkbox" id="shake-toggle" checked />
      </div>

      <div class="settings-row">
        <label for="quality-select">Render Quality</label>
        <select id="quality-select">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>

      <div class="settings-row">
        <label for="mute-btn-inline">Mute All</label>
        <button id="mute-btn" class="btn btn-secondary btn-small">🔊 Mute</button>
      </div>

      <p class="settings-hint">
        Shortcuts: <kbd>Space</kbd> Slap &middot; <kbd>Enter</kbd> Apply Name &middot; <kbd>R</kbd> Reset Counter
      </p>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
